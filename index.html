<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello-Agents 交互式学习 PPT</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app">
        <header class="hero-banner">
            <h1>Hello-Agents</h1>
            <p class="subtitle">从零开始构建智能体 · 交互式学习</p>
            <div class="progress-overview" id="heroProgress">
                <span>学习进度</span>
                <div class="progress-bar-hero">
                    <div class="fill" id="heroProgressFill" style="width: 0%"></div>
                </div>
                <span id="heroProgressText">0%</span>
            </div>
        </header>
        <main class="chapter-grid" id="chapterGrid"></main>
        <footer class="app-footer">
            <button class="btn btn-primary" id="btnStart">开始学习</button>
            <button class="btn btn-secondary" id="btnContinue">继续上次</button>
            <button class="btn btn-danger" id="btnReset">重置进度</button>
        </footer>
    </div>
    <button class="theme-toggle" id="themeToggle">🌓</button>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.addEventListener('click', () => {
                    const current = Storage.getTheme();
                    Storage.setTheme(current === 'light' ? 'dark' : 'light');
                });
            }
        });
    </script>
</body>
</html>
